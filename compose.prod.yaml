name: ${PROJECT_NAME}-prod

services:

  front:
    build:
      dockerfile: ./.docker/prod/front/Dockerfile
      args:
        API_URL: http://back:1337
    environment:
      NODE_ENV: production

  back:
    build:
      dockerfile: ./.docker/prod/back/Dockerfile
    environment:
      NODE_ENV: production
    volumes:
      - ./data/uploads:/app/public/uploads

  proxy:
    build:
      dockerfile: ./.docker/prod/proxy/Dockerfile
    volumes:
      - ./data/uploads:/srv/uploads:ro
